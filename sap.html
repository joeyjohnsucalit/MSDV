<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Records</title>

<style>
body {
    background: #0b1220;
    font-family: Arial, sans-serif;
    color: #fff;
}

/* Container */
.container {
    width: 90%;
    margin: 40px auto;
}

/* Top Controls */
.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.filters {
    display: flex;
    gap: 10px;
}

input, select, button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
}

input, select {
    background: #1b2a44;
    color: #fff;
}

button {
    cursor: pointer;
}

.btn-blue {
    background: #3b82f6;
    color: white;
}

.btn-outline {
    background: transparent;
    border: 1px solid #3b82f6;
    color: #3b82f6;
}

/* Table */
.table-container {
    background: #111c2e;
    border-radius: 12px;
    padding: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
}

th {
    font-size: 12px;
    color: #94a3b8;
    border-bottom: 1px solid #233048;
}

td {
    border-bottom: 1px solid #1f2a40;
}

/* Risk badges */
.badge {
    padding: 5px 10px;
    border-radius: 12px;
    font-size: 12px;
}

.critical { background: #7f1d1d; color: #fca5a5; }
.high { background: #78350f; color: #fdba74; }
.medium { background: #78350f; color: #fcd34d; }

/* Buttons */
.action-btn {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
}

.view {
    border: 1px solid #3b82f6;
    color: #3b82f6;
    background: transparent;
}

.delete {
    background: #7f1d1d;
    color: #fff;
}
</style>
</head>

<body>

<div class="container">

    <!-- Top Controls -->
    <div class="top-bar">
        <div class="filters">
            <input type="text" placeholder="Search...">
            <select><option>All Departments</option></select>
            <select><option>All Year Levels</option></select>
            <button class="btn-blue">Filter</button>
            <button class="btn-outline">Reset</button>
        </div>
            
    </div>

    <!-- Table -->
    <div class="table-container">
        <h3>Student Records</h3>

        <table>
            <thead>
                <tr>
                    <th>STUDENT ID</th>
                    <th>FULL NAME</th>
                    <th>COURSE</th>
                    <th>YEAR</th>
                    <th>SECTION</th>
                    <th>DEPARTMENT</th>
                    <th>RISK LEVEL</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>2024-0003</td>
                    <td>Cruz, Pedro J.</td>
                    <td>BSN</td>
                    <td>3rd Year</td>
                    <td>C</td>
                    <td>BSN</td>
                    <td><span class="badge critical">Critical</span></td>
                    <td>
                        <button class="action-btn view">View</button>
                        <button class="action-btn delete">Del</button>
                    </td>
                </tr>

                <tr>
                    <td>2024-0004</td>
                    <td>Dela Cruz, Ana R.</td>
                    <td>BSBA</td>
                    <td>4th Year</td>
                    <td>A</td>
                    <td>BSBA</td>
                    <td><span class="badge high">High</span></td>
                    <td>
                        <button class="action-btn view">View</button>
                        <button class="action-btn delete">Del</button>
                    </td>
                </tr>

                <tr>
                    <td>2024-0001</td>
                    <td>Reyes, Juan M.</td> 
                    <td>BSIT</td>
                    <td>2nd Year</td>
                    <td>A</td>
                    <td>BSIT</td>
                    <td><span class="badge medium">Medium</span></td>
                    <td>
                        <button class="action-btn view">View</button>
                        <button class="action-btn delete">Del</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</div>

</body>
</html>
